<!DOCTYPE html>
<!-- =====================================================================
  RYC PAGE TEMPLATE — copy this file to create any new root-level page.

  HOW TO USE:
  1. Copy this file to /pagename.html (root) or /pagename/pagename.html
  2. Replace PAGE_TITLE, PAGE_DESCRIPTION, PAGE_SLUG, PAGE_PATH
  3. Create pagename/pagename.css and pagename/pagename.js
  4. Add page-specific sections between the nav and footer injection points
  5. Add <link rel="stylesheet" href="pagename/pagename.css"> in head
  6. Add <script src="pagename/pagename.js"></script> at bottom of body

  RULES FOR PAGE CSS FILES:
  - Do NOT add @font-face declarations (they're in utility/base.css)
  - Do NOT add :root or [data-theme="dark"] tokens (they're in base.css)
  - Do NOT add body, html, or reset rules (they're in base.css)
  - Do NOT add .skip-link styles (they're in base.css)
  - Do NOT add body::after or body::before noise texture (base.css)
  - Do NOT add nav or footer styles (they're in utility/nav.css)
  - Do NOT add body > * broad selectors — use main { position: relative; z-index: 1; } from base.css
  - Only add styles specific to this page's unique sections

  FOR BLOG-POST PAGES (in /blog/):
  - Use ../ prefix on all utility links
  - Load ../utility/bundle.css (includes article.css) — no @font-face or :root needed
  - Load ../utility/blog-post.js before boot.js for TOC + share logic
  - No inline <style> or <script> blocks needed — bundle.css + blog-post.js cover everything
  - If the post has a truly unique style (e.g. a custom table layout), keep a minimal inline <style>

  FOR PAGES USING SUPABASE (index.html, work.html):
  - Load the Supabase CDN before utility/supabase.js
  - utility/supabase.js exposes window.RYC.sb, window.RYC.toSlug(), and window.RYC.MOCK
  - Page JS must use window.RYC.sb — never call window.supabase.createClient() directly
  - Do NOT add utility/supabase.js to boot.js — it is an opt-in, page-specific load
  ===================================================================== -->
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGE_TITLE — RYC Works</title>
<meta name="description" content="PAGE_DESCRIPTION">
<link rel="canonical" href="https://www.rycworks.com/PAGE_SLUG">

<meta property="og:type" content="website">
<meta property="og:site_name" content="RYC Works">
<meta property="og:url" content="https://www.rycworks.com/PAGE_SLUG">
<meta property="og:title" content="PAGE_TITLE — RYC Works">
<meta property="og:description" content="PAGE_DESCRIPTION">
<meta property="og:image" content="https://www.rycworks.com/assets/ryc-opengraph.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta property="twitter:card" content="summary_large_image">

<meta property="twitter:image" content="https://www.rycworks.com/assets/ryc-opengraph.jpg">

<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.ico">

<!-- Font preloads (required for performance) -->
<link rel="preload" href="assets/fonts/SpaceGrotesk-Black.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/SpaceGrotesk-Bold.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/SpaceGrotesk-Light.woff2" as="font" type="font/woff2" crossorigin>

<!-- Shared utility styles (base, nav, loader, glow-btn, page-transition) -->
<link rel="stylesheet" href="utility/bundle.css">
<link rel="stylesheet" href="PAGE_PATH/PAGE_PATH.css">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "PAGE_TITLE — RYC Works",
  "description": "PAGE_DESCRIPTION",
  "url": "https://www.rycworks.com/PAGE_SLUG",
  "isPartOf": {
    "@type": "WebSite",
    "name": "RYC Works",
    "url": "https://www.rycworks.com/"
  }
}
</script>

</head>
<body>

<!-- Page transition overlay — MUST be first child of body -->
<div class="page-transition" id="pageTransition" aria-hidden="true"></div>

<!-- Loader — MUST use id="pageLoader" (utility/loader.js looks for this exact ID) -->
<div class="loader" id="pageLoader" aria-hidden="true">
  <div class="loader-cube-scene">
    <div class="loader-cube">
      <div class="cube-face cube-front"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg></div>
      <div class="cube-face cube-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg></div>
      <div class="cube-face cube-left"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg></div>
      <div class="cube-face cube-right"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg></div>
      <div class="cube-face cube-top"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg></div>
      <div class="cube-face cube-bottom"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg></div>
    </div>
  </div>
</div>

<!-- Skip link — required for accessibility, position: absolute keeps it out of flow -->
<a href="#main-content" class="skip-link">Skip to main content</a>

<!-- Nav injection point — components.js replaces this with <nav> + .mobile-menu -->
<div id="site-nav"></div>

<!-- ====================== PAGE CONTENT ====================== -->
<main id="main-content">

  <!-- Add sections here -->

</main>
<!-- ========================================================= -->

<!-- Footer injection point -->
<div id="site-footer"></div>

<!--
  Scripts — page JS first, then boot.js loads all shared utilities in order.

  boot.js automatically handles (no page JS should duplicate these):
    - Loader hide/fade
    - Theme toggle (dark/light, persisted in localStorage)
    - Nav + footer injection (components.js)
    - Glow button init (glow-btn.js)
    - Page transitions (page-transition.js)
    - Reveal animations (.fade-up, .reveal-text) via IntersectionObserver (reveal.js)
    - Mobile menu open/close

  If this page uses Supabase, add these TWO lines BEFORE the page JS:
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="utility/supabase.js"></script>
-->
<script src="PAGE_PATH/PAGE_PATH.js"></script>
<script src="utility/boot.js"></script>

</body>
</html>
